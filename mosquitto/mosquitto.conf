# ── Persistence ───────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ── Plain MQTT TCP (backend / server-side clients) ────────────
listener 1883
allow_anonymous true

# ── Plain WebSocket (port 9001) ───────────────────────────────
# Use this when a reverse proxy (nginx, Railway, Cloudflare)
# handles TLS in front of Mosquitto.
listener 9001
protocol websockets
allow_anonymous true

# ── WebSocket Secure / WSS (port 9443) ───────────────────────
# Direct encrypted connection from the browser.
# Requires cert.pem and key.pem in /mosquitto/certs/
# Generate with: scripts/generate-certs.ps1  (or .sh)
listener 9443
protocol websockets
certfile /mosquitto/certs/cert.pem
keyfile  /mosquitto/certs/key.pem
allow_anonymous true
