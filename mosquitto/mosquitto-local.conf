# Local Windows config — run with:
#   "C:\Program Files\Mosquitto\mosquitto.exe" -c D:\CODING\DeepdarkFamtasy\mosquitto\mosquitto-local.conf -v

# Plain MQTT TCP
listener 1883
allow_anonymous true

# Plain WebSocket (used by Node.js proxy at /ws/mqtt)
listener 9001
protocol websockets
allow_anonymous true

# WebSocket Secure (direct LAN access without proxy)
listener 9443
protocol websockets
certfile D:\CODING\DeepdarkFamtasy\mosquitto\certs\cert.pem
keyfile  D:\CODING\DeepdarkFamtasy\mosquitto\certs\key.pem
allow_anonymous true
