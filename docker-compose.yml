version: '3.9'

services:

  # ── VideoCall Node.js app ─────────────────────────────────
  app:
    build: ./videocall
    ports:
      - "3000:3000"   # HTTP (redirects to HTTPS in dev mode)
      - "3443:3443"   # HTTPS + Socket.io
    environment:
      NODE_ENV: development
    depends_on:
      - mqtt
    restart: unless-stopped

  # ── Mosquitto MQTT broker ─────────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"   # Plain MQTT TCP
      - "9001:9001"   # Plain WebSocket (ws://)
      - "9443:9443"   # WebSocket Secure (wss://)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

volumes:
  mosquitto_data:
