<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoCall</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── LOGIN SCREEN ─────────────────────────────────────── -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg">
      <div class="login-orb orb1"></div>
      <div class="login-orb orb2"></div>
      <div class="login-orb orb3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo-wrap">
        <div class="login-logo-ring"></div>
        <div class="login-logo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon points="23 7 16 12 23 17 23 7"/>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
        </div>
      </div>
      <h1 class="login-title">VideoCall</h1>
      <p class="login-sub">Talk with AI or connect with anyone, anywhere</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="login-field" id="login-field">
          <label for="name-input" class="login-label">Your name</label>
          <input
            id="name-input"
            class="login-input"
            type="text"
            placeholder="Enter your name…"
            maxlength="50"
            autocomplete="given-name"
            spellcheck="false"
          />
          <span class="login-error" id="login-error"></span>
        </div>
        <button type="submit" class="login-btn" id="login-btn">
          <span id="login-btn-text">Get Started</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <!-- ─── HEADER ─────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      VideoCall
    </div>

    <nav class="mode-nav">
      <button class="mode-btn active" data-mode="ai">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        Talk with AI
      </button>
      <button class="mode-btn" data-mode="person">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Talk with Person
      </button>
    </nav>

    <div class="session-chip" id="session-chip" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      </svg>
      <span id="session-name"></span>
      <span class="session-dot">·</span>
      <span id="session-timer">0:00</span>
    </div>

    <button class="icon-btn" id="settings-open-btn" title="AI Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ─── MAIN ──────────────────────────────────────────── -->
  <main class="main">

    <!-- ── Video Column ── -->
    <section class="video-col">

      <!-- Room controls (person mode only) -->
      <div class="room-bar" id="room-bar" style="display:none">
        <div class="room-create" id="room-create">
          <span class="room-label">Your room code</span>
          <div class="room-code-display" id="room-code-display">—</div>
          <button class="btn-sm" id="copy-code-btn" title="Copy code">Copy</button>
          <span class="room-sep">·</span>
          <input id="join-input" class="room-input" type="text" placeholder="Enter code to join" maxlength="8" />
          <button class="btn-sm primary" id="join-btn">Join</button>
        </div>
        <div class="room-status" id="room-status"></div>
      </div>

      <!-- Remote video / AI avatar -->
      <div class="remote-wrap" id="remote-wrap">
        <video id="remote-video" autoplay playsinline></video>

        <div class="ai-avatar" id="ai-avatar">
          <div class="ai-rings">
            <div class="ai-ring r1"></div>
            <div class="ai-ring r2"></div>
            <div class="ai-ring r3"></div>
          </div>
          <div class="ai-face">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="5"/><path d="M3 21a9 9 0 0 1 18 0"/>
              <circle cx="9" cy="7" r="1" fill="currentColor" stroke="none"/>
              <circle cx="15" cy="7" r="1" fill="currentColor" stroke="none"/>
              <path d="M9.5 10.5 Q12 12 14.5 10.5" stroke-linecap="round"/>
            </svg>
            <span class="ai-label">AI</span>
          </div>
        </div>

        <div class="remote-name" id="remote-name">AI Assistant</div>
        <div class="speaking-badge" id="ai-speaking" style="display:none">Speaking…</div>
      </div>

      <!-- Local video (PiP) -->
      <div class="local-wrap" id="local-wrap">
        <video id="local-video" autoplay playsinline muted></video>
        <div class="cam-off-placeholder" id="cam-placeholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <span class="local-label">You</span>
      </div>

      <!-- Control bar -->
      <div class="controls">
        <button class="ctrl-btn" id="mic-btn" title="Toggle microphone">
          <svg id="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span class="ctrl-label">Mic</span>
        </button>

        <button class="ctrl-btn" id="video-btn" title="Toggle camera">
          <svg id="cam-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
          </svg>
          <span class="ctrl-label">Camera</span>
        </button>

        <button class="ctrl-btn" id="speech-btn" title="Toggle speech recognition">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M8 11v1a4 4 0 0 0 8 0v-1"/><line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
          <span class="ctrl-label">Speech</span>
        </button>

        <button class="ctrl-btn danger" id="end-btn" title="End call">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07C9.44 17.29 7.76 15.63 6.06 13a19.5 19.5 0 0 1-3-8.5A2 2 0 0 1 5 2.5h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.98 10.25a16 16 0 0 0 1.7 3.06z"/>
            <line x1="23" y1="1" x2="1" y2="23"/>
          </svg>
          <span class="ctrl-label">End</span>
        </button>
      </div>
    </section>

    <!-- ── Chat Column ── -->
    <section class="chat-col">
      <div class="chat-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Chat
        <span class="speech-indicator" id="speech-indicator" style="display:none">
          <span class="pulse-dot"></span>Listening
        </span>
      </div>

      <div class="chat-messages" id="chat-messages">
        <div class="chat-welcome">
          <p>Say hello or type a message to get started!</p>
        </div>
      </div>

      <div class="chat-input-wrap">
        <textarea id="chat-input" class="chat-input" placeholder="Type a message… (Enter to send)" rows="2"></textarea>
        <button class="send-btn" id="send-btn" title="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </section>
  </main>

  <!-- ─── SETTINGS MODAL ─────────────────────────────────── -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal" role="dialog" aria-modal="true" aria-label="AI Settings">
      <div class="modal-header">
        <h2>AI Settings</h2>
        <button class="icon-btn" id="settings-close-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <label class="field">
          <span>Provider</span>
          <select id="s-provider">
            <option value="openai">OpenAI / Compatible</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </label>

        <label class="field" id="field-baseurl">
          <span>Base URL</span>
          <input id="s-baseurl" type="url" placeholder="https://api.openai.com/v1" />
        </label>

        <label class="field">
          <span>API Key</span>
          <div class="input-group">
            <input id="s-apikey" type="password" placeholder="sk-…" autocomplete="off" />
            <button class="btn-sm" id="toggle-key-btn" type="button">Show</button>
          </div>
        </label>

        <label class="field">
          <span>Model</span>
          <input id="s-model" type="text" placeholder="gpt-4o-mini" />
        </label>

        <label class="field">
          <span>System Prompt</span>
          <textarea id="s-system" rows="3" placeholder="You are a helpful assistant."></textarea>
        </label>

        <label class="field row">
          <span>AI Voice Response (TTS)</span>
          <input id="s-tts" type="checkbox" />
        </label>

        <label class="field row" id="field-tts-rate">
          <span>Voice Rate <span id="rate-val">1.0</span>×</span>
          <input id="s-rate" type="range" min="0.5" max="2" step="0.1" value="1" />
        </label>

        <div class="settings-divider">WebRTC / TURN (optional — for cross-network calls)</div>

        <label class="field">
          <span>Custom TURN URL <small style="color:var(--text-muted)">(leave blank to use free public servers)</small></span>
          <input id="s-turn-url" type="text" placeholder="turn:your-server.com:3478" />
        </label>
        <div class="field-row-2">
          <label class="field">
            <span>TURN Username</span>
            <input id="s-turn-user" type="text" placeholder="username" autocomplete="off" />
          </label>
          <label class="field">
            <span>TURN Credential</span>
            <input id="s-turn-pass" type="password" placeholder="password" autocomplete="off" />
          </label>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn primary" id="settings-save-btn">Save Settings</button>
        <button class="btn" id="settings-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
